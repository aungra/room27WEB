name: Deploy to Lolipop FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ftp-1.lolipop.jp
      FTP_REMOTE_DIR: /room27/
      FTP_USERNAME: ${{ secrets.LOLIPOP_FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.LOLIPOP_FTP_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload static site
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<'LFTP'
          set ftp:ssl-allow no
          set net:max-retries 3
          set net:timeout 30
          mirror --reverse --verbose --delete \
            --exclude-glob .git/ \
            --exclude-glob .git/** \
            --exclude-glob .github/ \
            --exclude-glob .github/** \
            --exclude-glob node_modules/ \
            --exclude-glob node_modules/** \
            --exclude HANDOFF.md \
            --exclude vercel.json \
            --exclude .gitignore \
            ./ /room27/
          bye
          LFTP
