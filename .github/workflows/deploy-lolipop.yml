name: Deploy to Lolipop FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FTP_SERVER: ftp-1.lolipop.jp
      FTP_REMOTE_DIR: .
      FTP_USERNAME: ${{ secrets.LOLIPOP_FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.LOLIPOP_FTP_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload static site
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<LFTP
          set ftp:ssl-allow no
          set ftp:passive-mode on
          set ftp:prefer-epsv no
          set ftp:fix-pasv-address yes
          set ftp:sync-mode off
          set dns:order inet
          set net:connection-limit 1
          set net:max-retries 5
          set net:timeout 60
          pwd
          cls -la
          mirror --reverse --verbose=3 --parallel=1 \
            --exclude-glob .git/ \
            --exclude-glob .git/** \
            --exclude-glob .github/ \
            --exclude-glob .github/** \
            --exclude-glob node_modules/ \
            --exclude-glob node_modules/** \
            --exclude HANDOFF.md \
            --exclude vercel.json \
            --exclude .gitignore \
            ./ ./
          bye
          LFTP
